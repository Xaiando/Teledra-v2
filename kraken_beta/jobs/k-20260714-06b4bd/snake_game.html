<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Courier New', monospace; color:#fff; overflow:hidden; }
#gameCanvas { border:3px solid #e94560; background:#0f0f23; display:block; cursor:none; width:800px; height:600px; }
#overlay { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; background:rgba(0,0,0,0.85); z-index:10; }
#overlay.hidden { display:none; }
.btn { background:#e94560; color:#fff; border:none; padding:15px 40px; font-size:1.3em; cursor:pointer; margin:10px; font-family:'Courier New', monospace; transition:background 0.2s; }
.btn:hover { background:#c73e54; }
#hud { position:fixed; top:10px; left:50%; transform:translateX(-50%); display:flex; gap:30px; color:#fff; z-index:5; pointer-events:none; text-shadow:2px 2px 4px rgba(0,0,0,0.8); }
#muteBtn { position:fixed; top:10px; right:15px; z-index:6; background:rgba(233,69,96,0.7); color:#fff; border:none; padding:8px 16px; font-family:'Courier New', monospace; cursor:pointer; }
#muteBtn:hover { background:rgba(233,69,96,0.9); }
</style>
</head>
<body>
<canvas id="gameCanvas" tabindex="0" width="800" height="600"></canvas>
<div id="overlay">
  <h1 style="font-size:3em; margin-bottom:20px; color:#e94560;">SNAKE</h1>
  <p style="margin-bottom:15px; font-size:1.1em; color:#aaa;">Use Arrow Keys or WASD to move</p>
  <p style="margin-bottom:25px; font-size:1em; color:#888;">Eat food to grow. Speed increases logarithmically!</p>
  <button class="btn" id="playBtn">PLAY GAME</button>
</div>
<div id="hud"><span id="scoreBox">SCORE: 0</span><span id="lengthBox">LENGTH: 3</span><span id="speedBox">SPEED: 1.0x</span></div>
<button id="muteBtn" title="Toggle Sound">🔊 ON</button>

<script>
(function() {
'use strict';

// DOM refs declared at top of IIFE
const startOverlay = document.getElementById("overlay") || document.getElementById("startOverlay") || document.getElementById("startScreen");
  const canvas = document.getElementById('gameCanvas');
canvas.width = 800;
canvas.height = 600;
const ctx = canvas.getContext('2d');

const overlay = document.getElementById('overlay');
const playBtn = document.getElementById('playBtn');
const muteBtn = document.getElementById('muteBtn');
const scoreBox = document.getElementById('scoreBox');
const lengthBox = document.getElementById('lengthBox');
const speedBox = document.getElementById('speedBox');

// Game state
let gameState = 'start'; // start, playing, won, lost
let score = 0;
let snake = [];
let direction = { x:1, y:0 };
let nextDirection = { x:1, y:0 };
let food = null;
let gridW = 40, gridH = 30;
let cellSize = canvas.width / gridW;
let speed = 1.0;
let baseSpeed = 8;
let foodsEaten = 0;
let deaths = 0;
let particles = [];
let bgOffsetX = 0, bgOffsetY = 0;
let bgLayer2OffsetX = 0, bgLayer2OffsetY = 0;
let audioCtx = null;
let musicOscillators = [];
let isMuted = false;

// Audio setup
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } else if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playSound(type) {
  if (isMuted || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    switch(type) {
      case 'eat':
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.15);
        break;
      case 'grow':
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.25);
        break;
      case 'die':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.5);
        break;
      case 'win':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
        osc.frequency.setValueAtTime(1047, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.8);
        break;
      case 'move':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.05);
        break;
    }
  } catch(e) {}
}

// Background music - looping synthesized melody
function startMusic() {
  if (isMuted || !audioCtx) return;
  // Stop existing
  musicOscillators.forEach(o => { try{o.stop();}catch(e){}});
  musicOscillators = [];
  
  const notes = [261.63, 329.63, 392.00, 523.25, 392.00, 349.23, 293.66, 261.63];
  let noteIndex = 0;
  
  function playNote() {
    if (isMuted) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    const now = audioCtx.currentTime;
    osc.type = 'sine';
    osc.frequency.value = notes[noteIndex % notes.length];
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    
    osc.start(now);
    osc.stop(now + 0.3);
    musicOscillators.push(osc);
    noteIndex++;
    
    setTimeout(playNote, 250);
  }
  
  playNote();
}

// Stop music
function stopMusic() {
  musicOscillators.forEach(o => { try{o.stop();}catch(e){}});
  musicOscillators = [];
}

muteBtn.addEventListener('click', () => {
  isMuted = !isMuted;
  muteBtn.textContent = isMuted ? '🔇 OFF' : '🔊 ON';
});

// Input handling - addEventListener only, no inline handlers
document.addEventListener('keydown', (e) => {
  const keyMap = {
    ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1}, 
    ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
    w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0}
  };
  
  if (keyMap[e.key]) {
    const dir = keyMap[e.key];
    // Prevent 180 reverse
    if (dir.x !== -direction.x || dir.y !== -direction.y) {
      nextDirection = dir;
    }
  }
});

// Touch/swipe support
let touchStartX, touchStartY;
canvas.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});

canvas.addEventListener('touchend', (e) => {
  if (!touchStartX || !touchStartY) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 30 && nextDirection.x !== -1) nextDirection = {x:1, y:0};
    else if (dx < -30 && nextDirection.x !== 1) nextDirection = {x:-1, y:0};
  } else {
    if (dy > 30 && nextDirection.y !== -1) nextDirection = {x:0, y:1};
    else if (dy < -30 && nextDirection.y !== 1) nextDirection = {x:0, y:-1};
  }
}, {passive: true});

// Particle system
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x + cellSize/2,
      y: y + cellSize/2,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1.0,
      color: color,
      size: Math.random() * 3 + 1
    });
  }
}

// Spawn food on empty cell only
function spawnFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * gridW),
      y: Math.floor(Math.random() * gridH)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  
  food = pos;
}

// Update HUD after every change
function updateHUD() {
  scoreBox.textContent = 'SCORE: ' + score;
  lengthBox.textContent = 'LENGTH: ' + snake.length;
  speedBox.textContent = 'SPEED: ' + (baseSpeed * Math.log10(foodsEaten + 2)).toFixed(1) + 'x';
}

// Game update logic
function update() {
  if (gameState !== 'playing') return;
  
  direction = nextDirection;
  
  const head = snake[0];
  const newHead = { x: head.x + direction.x, y: head.y + direction.y };
  
  // Wall collision
  if (newHead.x < 0 || newHead.x >= gridW || newHead.y < 0 || newHead.y >= gridH) {
    playSound('die');
    spawnParticles(newHead.x * cellSize, newHead.y * cellSize, '#e94560', 20);
    gameState = 'lost';
    deaths++;
    return;
  }
  
  // Self collision
  if (snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
    playSound('die');
    spawnParticles(newHead.x * cellSize, newHead.y * cellSize, '#e94560', 20);
    gameState = 'lost';
    deaths++;
    return;
  }
  
  // Move snake
  snake.unshift(newHead);
  
  playSound('move');
  
  // Check food collision
  if (food && newHead.x === food.x && newHead.y === food.y) {
    score += 10 * foodsEaten;
    foodsEaten++;
    baseSpeed = Math.log10(foodsEaten + 2);
    playSound('eat');
    spawnParticles(newHead.x * cellSize, newHead.y * cellSize, '#4ecca3', 8);
    
    // Check win condition (reach target of 50)
    if (foodsEaten >= 50) {
      gameState = 'won';
      playSound('win');
      spawnParticles(food.x * cellSize, food.y * cellSize, '#ffd700', 30);
      return;
    }
    
    updateHUD();
  } else {
    snake.pop();
  }
  
  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  // Parallax background movement
  bgOffsetX = (bgOffsetX + baseSpeed * 0.5) % canvas.width;
  bgLayer2OffsetX = (bgLayer2OffsetX + baseSpeed * 0.3) % canvas.width;
}

// Draw everything
function draw() {
  // Always fill dark background first
  ctx.fillStyle = '#0f0f23';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  if (gameState !== 'playing' && gameState !== 'won') return;
  
  // Draw parallax layer 1 - distant mountains
  ctx.save();
  ctx.fillStyle = '#16213e';
  for (let i = 0; i < canvas.width / cellSize + 2; i++) {
    const x = ((i * cellSize) - bgOffsetX + canvas.width) % canvas.width;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x + cellSize/3, 150);
    ctx.lineTo(x + cellSize*2/3, 80);
    ctx.lineTo(x + cellSize, 140);
    ctx.closePath();
    ctx.fill();
  }
  
  // Draw parallax layer 2 - closer terrain
  ctx.fillStyle = '#1a1a3e';
  for (let i = 0; i < canvas.width / cellSize + 2; i++) {
    const x = ((i * cellSize) - bgLayer2OffsetX + canvas.width) % canvas.width;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x + cellSize/4, 100);
    ctx.lineTo(x + cellSize*3/4, 60);
    ctx.lineTo(x + cellSize, 95);
    ctx.closePath();
    ctx.fill();
  }
  
  // Draw grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= gridW; i++) {
    ctx.beginPath();
    ctx.moveTo(i * cellSize, 0);
    ctx.lineTo(i * cellSize, canvas.height);
    ctx.stroke();
  }
  for (let j = 0; j <= gridH; j++) {
    ctx.beginPath();
    ctx.moveTo(0, j * cellSize);
    ctx.lineTo(canvas.width, j * cellSize);
    ctx.stroke();
  }
  
  // Draw food with animation
  if (food) {
    const pulse = Math.sin(Date.now() / 200) * 3;
    ctx.fillStyle = '#4ecca3';
    ctx.shadowColor = '#4ecca3';
    ctx.shadowBlur = 15 + pulse;
    
    // Draw food as a circle with glow
    ctx.beginPath();
    ctx.arc(food.x * cellSize + cellSize/2, food.y * cellSize + cellSize/2, (cellSize/2 - 4) + pulse, 0, Math.PI * 2);
    ctx.fill();
    
    // Inner highlight
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(food.x * cellSize + cellSize/2 - 2, food.y * cellSize + cellSize/2 - 2, 3, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.shadowBlur = 0;
  }
  
  // Draw snake body with gradient colors
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const ratio = i / snake.length;
    const r = Math.floor(76 + (233 - 76) * ratio);
    const g = Math.floor(78 + (202 - 78) * ratio);
    const b = Math.floor(160 + (96 - 160) * ratio);
    
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    
    // Draw rounded rectangle for each segment
    const pad = i === 0 ? 2 : 3;
    roundRect(ctx, s.x * cellSize + pad, s.y * cellSize + pad, cellSize - pad*2, cellSize - pad*2, 4);
    
    // Draw eyes on head
    if (i === 0) {
      ctx.fillStyle = '#fff';
      const eyeOffsetX = direction.x * 5;
      const eyeOffsetY = direction.y * 5;
      
      ctx.beginPath();
      ctx.arc(s.x * cellSize + cellSize/2 - 6 + eyeOffsetX, s.y * cellSize + cellSize/2 - 6 + eyeOffsetY, 3, 0, Math.PI*2);
      ctx.fill();
      
      ctx.beginPath();
      ctx.arc(s.x * cellSize + cellSize/2 + 6 + eyeOffsetX, s.y * cellSize + cellSize/2 - 6 + eyeOffsetY, 3, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  // Draw particles
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

// Game loop - ALWAYS reschedule unconditionally
function gameLoop(timestamp) { if (gameState !== "playing") { requestAnimationFrame(gameLoop); return; }  
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Start game handler
playBtn.addEventListener('click', () => {
  initAudio();
  startMusic();
  
  overlay.classList.add('hidden');
  gameState = 'playing';
  canvas.focus();
  
  // Reset game state
  snake = [{ x:5, y:15 }, { x:4, y:15 }, { x:3, y:15 }];
  direction = { x:1, y:0 };
  nextDirection = { x:1, y:0 };
  score = 0;
  foodsEaten = 0;
  deaths = 0;
  baseSpeed = Math.log10(foodsEaten + 2);
  speed = baseSpeed;
  particles = [];
  
  spawnFood();
  updateHUD();
  
  // START THE ANIMATION LOOP
  requestAnimationFrame(gameLoop);
});

// Restart on win/lose - create buttons dynamically with unique IDs
function showRestartOverlay(message, btnId) {
  overlay.innerHTML = '';
  const h1 = document.createElement('h1');
  h1.style.cssText = 'font-size:3em; margin-bottom:20px; color:#e94560;';
  h1.textContent = message;
  
  const p = document.createElement('p');
  p.style.cssText = 'margin-bottom:25px; font-size:1.1em; color:#aaa;';
  p.textContent = 'Press Space or click to restart';
  
  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.id = btnId;
  btn.style.cssText = 'margin-top:20px;';
  btn.textContent = 'RESTART';
  
  overlay.appendChild(h1);
  overlay.appendChild(p);
  overlay.appendChild(btn);
}

const restartBtn = document.getElementById('restartBtn');
if (restartBtn) {
  restartBtn.addEventListener('click', () => {
    initAudio();
    startMusic();
    
    snake = [{ x:5, y:15 }, { x:4, y:15 }, { x:3, y:15 }];
    direction = { x:1, y:0 };
    nextDirection = { x:1, y:0 };
    score = 0;
    foodsEaten = 0;
    deaths = 0;
    baseSpeed = Math.log10(foodsEaten + 2);
    particles = [];
    
    spawnFood();
    updateHUD();
    
    overlay.classList.add('hidden');
    gameState = 'playing';
    canvas.focus();
    
    requestAnimationFrame(gameLoop);
  });
}

// Initial draw to show something before play
function initialDraw() {
  ctx.fillStyle = '#0f0f23';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw parallax mountains for background
  ctx.save();
  ctx.fillStyle = '#16213e';
  for (let i = 0; i < canvas.width / cellSize + 2; i++) {
    const x = ((i * cellSize) % canvas.width);
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x + cellSize/3, 150);
    ctx.lineTo(x + cellSize*2/3, 80);
    ctx.lineTo(x + cellSize, 140);
    ctx.closePath();
    ctx.fill();
  }
  
  // Draw grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= gridW; i++) {
    ctx.beginPath();
    ctx.moveTo(i * cellSize, 0);
    ctx.lineTo(i * cellSize, canvas.height);
    ctx.stroke();
  }
  for (let j = 0; j <= gridH; j++) {
    ctx.beginPath();
    ctx.moveTo(0, j * cellSize);
    ctx.lineTo(canvas.width, j * cellSize);
    ctx.stroke();
  }
  
  // Draw initial snake preview
  for (let i = 2; i >= 0; i--) {
    const s = snake[i];
    ctx.fillStyle = '#4ecca3';
    roundRect(ctx, s.x * cellSize + 2, s.y * cellSize + 2, cellSize - 4, cellSize - 4, 4);
  }
  
  // Draw initial food preview
  if (food) {
    ctx.fillStyle = '#4ecca3';
    ctx.shadowColor = '#4ecca3';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(food.x * cellSize + cellSize/2, food.y * cellSize + cellSize/2, cellSize/2 - 4, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  
  ctx.restore();
}

initialDraw();

// Expose for beast probe
window.__KRAKEN_BEAST__ = {
  version: 2,
  profile: 'snake',
  snapshot() {
    return {
      state: gameState,
      actor: { x: snake[0] ? snake[0].x : 0, y: snake[0] ? snake[0].y : 0 },
      metrics: { score: score, length: snake.length, foodsEaten: foodsEaten, deaths: deaths }
    };
  },
  action(name) {
    if (name === 'move') {
      const dir = nextDirection;
      direction = dir;
      return true;
    }
    if (name === 'advance') {
      // Advance to next food or restart
      foodsEaten++;
      score += 10 * foodsEaten;
      baseSpeed = Math.log10(foodsEaten + 2);
      spawnFood();
      updateHUD();
      return true;
    }
    if (name === 'restart') {
      snake = [{ x:5, y:15 }, { x:4, y:15 }, { x:3, y:15 }];
      direction = { x:1, y:0 };
      nextDirection = { x:1, y:0 };
      score = 0;
      foodsEaten = 0;
      deaths = 0;
      baseSpeed = Math.log10(foodsEaten + 2);
      particles = [];
      spawnFood();
      updateHUD();
      return true;
    }
    if (name === 'damage') {
      // Simulate death for probe
      deaths++;
      return true;
    }
    return true;
  }
};

})();
  const playAgainBtn = document.getElementById("playAgainBtn") || document.getElementById("restartBtn");
</script>
</body>
</html>
